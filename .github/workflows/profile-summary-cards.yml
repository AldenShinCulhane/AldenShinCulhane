name: GitHub Profile Summary Cards

on:
  schedule:
    # Weekly, Sunday 05:00 UTC — keeps the language charts fresh.
    - cron: "0 5 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/profile-summary-cards.yml"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: -5
